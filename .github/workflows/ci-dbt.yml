name: dbt CI

on:
  push:
    branches: [ main ]
    paths:
      - 'dbt/**'
      - '.github/workflows/ci-dbt.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'dbt/**'
      - '.github/workflows/ci-dbt.yml'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Astral uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dbt
        run: uv pip install --system dbt-core dbt-snowflake

      - name: dbt Compile check
        run: |
          cd dbt
          dbt compile --profiles-dir .
