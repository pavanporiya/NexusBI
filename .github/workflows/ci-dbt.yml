name: dbt CI

on:
  push:
    branches: [ main ]
    paths:
      - 'dbt/**'
      - '.github/workflows/ci-dbt.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'dbt/**'
      - '.github/workflows/ci-dbt.yml'

permissions:
  contents: read

concurrency:
  group: dbt-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: dbt Compile
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: dbt

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Astral uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dbt
        run: |
          uv venv
          uv pip install dbt-core dbt-snowflake

      - name: Install dbt packages
        run: dbt deps --profiles-dir .

      - name: Compile dbt project
        run: dbt compile --profiles-dir .
